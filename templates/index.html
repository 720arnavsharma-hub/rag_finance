<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RAG Finance Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        h2 { color: #555; margin-top: 30px; }
        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        input[type="text"] {
            width: 75%;
            padding: 8px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="file"] { font-size: 14px; }
        button {
            padding: 8px 18px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 8px;
        }
        button:hover { background: #357abd; }

        /* File list */
        .file-list {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .file-pill {
            display: flex;
            align-items: center;
            background: #e8f0fe;
            border: 1px solid #4a90e2;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 13px;
            color: #333;
        }
        .file-pill .remove {
            margin-left: 8px;
            cursor: pointer;
            color: #e53935;
            font-weight: bold;
            font-size: 15px;
            background: none;
            border: none;
            padding: 0;
            line-height: 1;
        }
        .file-pill .remove:hover { color: #b71c1c; background: none; }
        .no-files {
            color: #999;
            font-size: 13px;
            margin-top: 8px;
        }

        .answer-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #4a90e2;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: Arial, sans-serif;
            margin: 0;
        }
    </style>
</head>
<body>

    <h1>📄 RAG Finance Assistant</h1>

    <h2>1. Uploaded Documents</h2>
    <div style="background:white; padding:20px; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,0.1);">
        <div class="file-list" id="fileList">
            {% if files %}
                {% for file in files %}
                <div class="file-pill" id="pill-{{ loop.index }}">
                    📄 {{ file }}
                    <button class="remove" onclick="deleteFile('{{ file }}', 'pill-{{ loop.index }}')">✕</button>
                </div>
                {% endfor %}
            {% else %}
                <p class="no-files" id="noFilesMsg">No documents uploaded yet.</p>
            {% endif %}
        </div>
    </div>

    <h2>2. Upload New Documents</h2>
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="files" multiple accept=".txt,.pdf">
        <button type="submit">Upload & Index</button>
    </form>

    <h2>3. Ask a Question</h2>
    <form method="POST">
        <input type="text" name="query" placeholder="e.g. What is the total invoice amount?" required>
        <button type="submit">Ask</button>
    </form>

    {% if answer %}
    <h2>Answer</h2>
    <div class="answer-box">
        <pre>{{ answer }}</pre>
    </div>
    {% endif %}

    <script>
        function deleteFile(filename, pillId) {
            if (!confirm("Remove " + filename + "?")) return;

            fetch("/delete/" + encodeURIComponent(filename), { method: "POST" })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        const pill = document.getElementById(pillId);
                        pill.remove();
                        const list = document.getElementById("fileList");
                        if (list.querySelectorAll(".file-pill").length === 0) {
                            list.innerHTML = '<p class="no-files">No documents uploaded yet.</p>';
                        }
                    } else {
                        alert("Error removing file: " + data.error);
                    }
                });
        }
    </script>

</body>
</html>
